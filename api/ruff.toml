line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM"]
ignore = ["E501"]

[lint.per-file-ignores]
# Capital X for feature matrices, y for labels, X_rows for row buffer — ML
# convention. N806/N803 object to these as non-lowercase.
"src/phishpicker/train/**" = ["N806", "N803"]
"src/phishpicker/model/lightgbm_scorer.py" = ["N806", "N803"]
"tests/train/**" = ["N806", "N803"]
"tests/model/test_lightgbm_scorer.py" = ["N806", "N803"]

[format]
quote-style = "double"

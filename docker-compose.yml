services:
  api:
    build: ./api
    volumes:
      # Set PHISHPICKER_DATA_HOST in .env to the host-side data dir.
      - ${PHISHPICKER_DATA_HOST:?PHISHPICKER_DATA_HOST must be set in .env}:/data
    environment:
      PHISHPICKER_DATA_DIR: /data
      # ${VAR:?} fails fast if the var isn't set — prevents the silent-empty-key footgun.
      PHISHNET_API_KEY: ${PHISHNET_API_KEY:?PHISHNET_API_KEY must be set in .env}
      PHISHPICKER_ADMIN_TOKEN: ${PHISHPICKER_ADMIN_TOKEN:?PHISHPICKER_ADMIN_TOKEN must be set in .env}
      # Web Push / VAPID. Optional — push is a no-op if unset, so we don't fail fast.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/meta').status==200 else 1)"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build: ./web
    environment:
      API_INTERNAL_URL: http://api:8000
    # Bind on all host interfaces so the cloudflared container (host net,
    # reaches origins via 172.17.0.1 = docker0 gateway) and the LAN can both
    # hit it. LAN exposure is gated by the router firewall; public access
    # goes through Cloudflare Access. Port is configurable to avoid clashes
    # with other docker stacks on the same host.
    ports:
      - "${PHISHPICKER_WEB_PORT:-3400}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

networks:
  internal:
    driver: bridge
